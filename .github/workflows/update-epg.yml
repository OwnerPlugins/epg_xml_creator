name: Aggiorna EPG

on:
  schedule:
    - cron: '0 6 * * *'
  workflow_dispatch:

jobs:
  update-epg:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Installa dipendenze
        run: pip install requests

      - name: Esegui epg_create.py
        run: python epg_create.py

      - name: Commit e push modifiche
        run: |
          git config user.name "GitHub Actions Bot"
          git config user.email "actions@github.com"
          git add epg.xml epg_ITA.xml 2>/dev/null || true
          git diff --staged --quiet || git commit -m "Aggiornamento automatico EPG $(date +'%Y-%m-%d')"
          git push
