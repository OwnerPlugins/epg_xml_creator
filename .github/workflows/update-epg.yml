name: Aggiorna EPG

on:
  schedule:
    # Ogni giorno alle 6:00 UTC (le 8:00 in Italia)
    - cron: '0 6 * * *'
  workflow_dispatch:  # Permette l'esecuzione manuale

jobs:
  update-epg:
    runs-on: ubuntu-latest

    steps:
      # 1. Checkout del repository
      - name: Checkout repository
        uses: actions/checkout@v4

      # 2. Setup Python
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      # 3. Esegui lo script (supponendo che sia in scripts/epg_create.py)
      - name: Esegui epg_create.py
        run: |
          cd scripts
          python epg_create.py
        # Lo script genererà epg.xml (e altri file) nella stessa cartella scripts/

      # 4. Sposta i file XML generati nella root del progetto (opzionale)
      #    Se vuoi che rimangano in una cartella specifica, adatta i percorsi.
      - name: Copia XML generati nella root
        run: |
          if [ -f scripts/epg.xml ]; then
            cp scripts/epg.xml epg.xml
          fi
          if [ -f scripts/epg_ITA.xml ]; then
            cp scripts/epg_ITA.xml epg_ITA.xml
          fi

      # 5. Commit e push delle modifiche (se ci sono cambiamenti)
      - name: Commit e push
        run: |
          git config user.name "GitHub Actions Bot"
          git config user.email "actions@github.com"
          git add epg.xml epg_ITA.xml 2>/dev/null || true
          git diff --staged --quiet || git commit -m "Aggiornamento automatico EPG $(date +'%Y-%m-%d')"
          git push
